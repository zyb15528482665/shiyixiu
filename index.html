<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="试衣秀">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%23d4a574'/><stop offset='100%' stop-color='%23c89b6e'/></linearGradient></defs><rect width='192' height='192' rx='42' fill='url(%23g)'/><text x='96' y='130' font-size='105' text-anchor='middle'>👗</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<title>试衣秀 · AI 虚拟试穿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

:root{
  --gold:#c8a87c;--gold-light:#e0ceb0;--gold-dark:#a07840;
  --bg:#08080d;--surface:#12121a;--surface2:#1a1a26;
  --card:rgba(22,22,35,0.8);--border:rgba(200,168,124,0.12);
  --text:#ebe5dd;--sub:#8a8278;--dim:#5a5550;
  --radius:18px;--shadow:0 8px 32px rgba(0,0,0,0.4);
  --blur:blur(20px);
  --font:"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100dvh;padding-bottom:40px;
  -webkit-tap-highlight-color:transparent;
  background-image:
    radial-gradient(ellipse at 50% 0%,rgba(200,168,124,0.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(200,168,124,0.04) 0%,transparent 40%),
    radial-gradient(ellipse at 20% 60%,rgba(180,140,100,0.03) 0%,transparent 30%);
}

/* ── Header ── */
header{
  padding:22px 20px 18px;text-align:center;
  background:linear-gradient(180deg,rgba(22,22,35,0.95) 0%,rgba(8,8,13,0) 100%);
  border-bottom:1px solid var(--border);
}
header .logo{font-size:13px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
header h1{font-size:26px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dark));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-size:11px;color:var(--dim);margin-top:2px;letter-spacing:1px}

/* ── Cards ── */
.card{
  margin:16px 16px;padding:20px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  box-shadow:var(--shadow);transition:border-color .3s;
}
.card h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:.5px}
.card h3::before{content:'';width:3px;height:16px;background:linear-gradient(180deg,var(--gold-light),var(--gold-dark));border-radius:2px}

/* ── Upload ── */
.upload-area{
  border:1.5px dashed rgba(200,168,124,0.25);border-radius:14px;
  padding:28px;text-align:center;cursor:pointer;transition:all .35s;
  background:rgba(200,168,124,0.02);position:relative;overflow:hidden;
}
.upload-area::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s;
  background:radial-gradient(circle at center,rgba(200,168,124,0.06) 0%,transparent 70%);
}
.upload-area:active::before,.upload-area:hover::before{opacity:1}
.upload-area:active{transform:scale(.97);border-color:var(--gold)}
.upload-area .icon{font-size:44px;margin-bottom:8px;filter:grayscale(.5)}
.upload-area .hint{font-size:12px;color:var(--sub);line-height:1.6}
.upload-area img{max-width:100%;max-height:200px;border-radius:10px;margin-top:10px;box-shadow:0 4px 20px rgba(0,0,0,.3);display:none}
.upload-area img.show{display:inline}
.upload-area img.show+.placeholder{display:none}

/* ── Search ── */
.search-row{display:flex;gap:8px;margin:14px 0}
.search-input{
  flex:1;padding:13px 16px;border-radius:14px;
  border:1px solid var(--border);font-size:14px;font-family:var(--font);
  background:var(--surface2);color:var(--text);letter-spacing:.5px;
  transition:border-color .3s;
}
.search-input::placeholder{color:var(--dim)}
.search-input:focus{outline:none;border-color:var(--gold)}
.search-btn{
  padding:13px 20px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:#0a0a0f;font-weight:700;font-size:13px;cursor:pointer;
  font-family:var(--font);letter-spacing:.5px;transition:all .2s;
  box-shadow:0 4px 16px rgba(200,168,124,0.2);
}
.search-btn:active{transform:scale(.94);box-shadow:0 2px 8px rgba(200,168,124,0.15)}

/* ── Clothes Grid ── */
.clothes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.clothes-item{
  aspect-ratio:.75;border-radius:12px;overflow:hidden;cursor:pointer;
  position:relative;background:var(--surface2);transition:all .3s;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.clothes-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.clothes-item:active img{transform:scale(1.08)}
.clothes-item.selected{
  outline:2.5px solid var(--gold);outline-offset:-2.5px;
  box-shadow:0 0 24px rgba(200,168,124,0.3);
}
.clothes-item.selected::after{
  content:'✓';position:absolute;top:8px;right:8px;
  background:var(--gold);color:#0a0a0f;width:24px;height:24px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,.3);
}

/* ── Tags ── */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  font-size:11px;color:var(--sub);cursor:pointer;transition:all .2s;
  background:rgba(200,168,124,0.03);font-family:var(--font);
}
.tag:active{background:rgba(200,168,124,0.12);border-color:var(--gold);color:var(--gold-light)}

/* ── API Key Row ── */
.key-row{display:flex;gap:8px;margin:0 16px 10px;align-items:center}
.key-row span{font-size:11px;color:var(--dim);white-space:nowrap;letter-spacing:1px}
.key-input{
  flex:1;padding:10px 14px;border-radius:12px;
  border:1px solid var(--border);font-size:12px;font-family:var(--font);
  background:var(--surface);color:var(--text);
}
.key-input:focus{outline:none;border-color:var(--gold)}
.key-save{
  padding:10px 16px;border-radius:12px;border:1px solid var(--gold);
  background:transparent;color:var(--gold);font-weight:600;font-size:12px;
  cursor:pointer;font-family:var(--font);transition:all .2s;
}
.key-save:active{background:rgba(200,168,124,0.12)}

/* ── TryOn Button ── */
.btn-tryon{
  display:block;width:calc(100% - 32px);margin:20px 16px;padding:18px;
  border-radius:16px;border:none;
  background:linear-gradient(135deg,#c8a87c,#a07840);
  color:#0a0a0f;font-size:16px;font-weight:800;cursor:pointer;
  font-family:var(--font);letter-spacing:2px;
  box-shadow:0 8px 32px rgba(200,168,124,0.25);
  transition:all .3s;position:relative;overflow:hidden;
}
.btn-tryon::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,0.1),transparent);
  transform:translateX(-100%);transition:transform .6s;
}
.btn-tryon:not(:disabled):hover::after{transform:translateX(100%)}
.btn-tryon:active{transform:scale(.96);box-shadow:0 4px 16px rgba(200,168,124,0.15)}
.btn-tryon:disabled{opacity:.35;pointer-events:none;filter:grayscale(.5)}

/* ── Loading ── */
.loading-overlay{
  position:fixed;inset:0;background:rgba(8,8,13,0.92);z-index:200;
  display:none;align-items:center;justify-content:center;flex-direction:column;
  backdrop-filter:blur(10px);
}
.loading-overlay.show{display:flex}
.spinner{
  width:48px;height:48px;border:2.5px solid rgba(200,168,124,0.15);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .7s cubic-bezier(.6,.2,.4,.8) infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--sub);margin-top:18px;font-size:13px;letter-spacing:1px}

/* ── Result ── */
.result-overlay{
  position:fixed;inset:0;background:rgba(8,8,13,0.96);z-index:250;
  display:none;align-items:center;justify-content:center;flex-direction:column;padding:24px;
  backdrop-filter:blur(20px);
}
.result-overlay.show{display:flex}
.result-overlay img{max-width:92%;max-height:62vh;border-radius:18px;box-shadow:0 16px 48px rgba(0,0,0,.6)}
.result-actions{display:flex;gap:14px;margin-top:24px}
.result-btn{
  padding:14px 28px;border-radius:14px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);
  letter-spacing:.5px;transition:all .2s;
}
.result-btn.primary{background:var(--gold);color:#0a0a0f;box-shadow:0 4px 20px rgba(200,168,124,.25)}
.result-btn.ghost{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid rgba(255,255,255,.08)}
.result-btn:active{transform:scale(.94)}

/* ── Toast ── */
.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);
  background:rgba(22,22,35,.95);color:var(--text);padding:14px 26px;
  border-radius:12px;font-size:13px;font-weight:500;letter-spacing:.5px;
  z-index:300;pointer-events:none;opacity:0;transition:all .25s;
  border:1px solid var(--border);backdrop-filter:blur(10px);
}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ── File Input Hint ── */
.file-hint{text-align:center;margin-top:10px;font-size:11px;color:var(--dim)}
.file-hint span{color:var(--gold);cursor:pointer;transition:color .2s}
.file-hint span:active{color:var(--gold-light)}
</style>
</head>
<body>
<header>
  <div class="logo">Virtual Try-On</div>
  <h1>试衣秀</h1>
  <p>AI 虚拟试穿 · 通义万相引擎 · 所见即所穿</p>
</header>

<!-- 我的照片 -->
<div class="card">
  <h3>我的照片</h3>
  <div class="upload-area" id="personArea" onclick="document.getElementById('pf').click()">
    <div class="placeholder"><div class="icon">🧍</div><div class="hint">点击上传全身照<br>正面站立效果最佳</div></div>
    <img id="pp">
  </div>
  <input type="file" id="pf" accept="image/*" style="display:none" onchange="hP(this)">
</div>

<!-- 衣服选择 -->
<div class="card">
  <h3>选择服装</h3>
  <div class="tags">
    <span class="tag" onclick="qs('碎花连衣裙')">碎花连衣裙</span>
    <span class="tag" onclick="qs('西装外套')">西装外套</span>
    <span class="tag" onclick="qs('针织开衫')">针织开衫</span>
    <span class="tag" onclick="qs('阔腿裤')">阔腿裤</span>
    <span class="tag" onclick="qs('风衣')">风衣</span>
    <span class="tag" onclick="qs('衬衫')">衬衫</span>
  </div>
  <div class="search-row">
    <input class="search-input" id="sq" placeholder="搜索你想要的服装..." onkeydown="if(event.key==='Enter')search()">
    <button class="search-btn" onclick="search()">搜索</button>
  </div>
  <div class="clothes-grid" id="grid">
    <div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--dim);font-size:12px;letter-spacing:.5px">🔍 输入关键词搜索服装</div>
  </div>
  <div class="file-hint">或 <span onclick="document.getElementById('cf').click()">📁 本地上传衣服图片</span></div>
  <input type="file" id="cf" accept="image/*" style="display:none" onchange="hC(this)">
  <div class="upload-area" id="clothArea" style="margin-top:10px;display:none">
    <img id="cp">
  </div>
</div>

<!-- API Key -->
<div class="key-row">
  <span>API KEY</span>
  <input class="key-input" id="ak" placeholder="sk-xxxxxxxx" value="">
  <button class="key-save" onclick="saveKey()">保存</button>
</div>

<!-- 试穿按钮 -->
<button class="btn-tryon" id="btnT" disabled onclick="doIt()">✦ 开始试穿</button>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">AI 正在生成试穿效果...</div>
</div>

<!-- Result -->
<div class="result-overlay" id="result">
  <img id="ri" alt="试穿结果">
  <div class="result-actions">
    <button class="result-btn ghost" onclick="document.getElementById('result').classList.remove('show')">关闭</button>
    <button class="result-btn primary" onclick="dl()">💾 保存到相册</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let person=null,cloth=null,ak=localStorage.getItem('ak')||'';
document.getElementById('ak').value=ak;

function hP(i){const f=i.files[0];if(!f)return;compress(f,d=>{
  person=d;document.getElementById('pp').src=d;document.getElementById('pp').classList.add('show');
  updateBtn()})}
function hC(i){const f=i.files[0];if(!f)return;compress(f,d=>{
  cloth=d;document.getElementById('cp').src=d;document.getElementById('cp').classList.add('show');
  document.getElementById('clothArea').style.display='block';updateBtn()})}
function compress(f,cb){const r=new FileReader();r.onload=e=>{
  const img=new Image();img.onload=()=>{
    const mx=800,s=Math.min(1,mx/Math.max(img.width,img.height));
    const cv=document.createElement('canvas');cv.width=img.width*s;cv.height=img.height*s;
    cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
    cb(cv.toDataURL('image/jpeg',.85))};img.src=e.target.result};r.readAsDataURL(f)}

function updateBtn(){const b=document.getElementById('btnT');b.disabled=!(person&&cloth)}
function saveKey(){ak=document.getElementById('ak').value.trim();localStorage.setItem('ak',ak);toast('API Key 已保存')}

function qs(q){document.getElementById('sq').value=q;search()}
async function search(){
  const q=document.getElementById('sq').value||'连衣裙';
  const g=document.getElementById('grid');g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--dim);font-size:12px">搜索中...</div>';
  try{
    const r=await fetch('https://api.unsplash.com/search/photos?query='+encodeURIComponent(q+' fashion clothing')+'&per_page=30&client_id=demo');
    const d=await r.json();
    if(d.results)g.innerHTML=d.results.map(r=>`<div class="clothes-item" onclick="sel(this,'${r.urls.regular.replace(/'/g,"\\'")}')"><img src="${r.urls.small}" loading="lazy"></div>`).join('');
    else g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--dim);font-size:12px">未找到结果</div>';
  }catch(e){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--dim);font-size:12px">网络异常，请本地上传</div>'}
}

async function sel(el,url){
  document.querySelectorAll('.clothes-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  try{const r=await fetch(url);const b=await r.blob();
    const rd=new FileReader();rd.onload=e=>compressFromDataURL(e.target.result,d=>{
      cloth=d;document.getElementById('cp').src=d;document.getElementById('cp').classList.add('show');
      document.getElementById('clothArea').style.display='block';updateBtn()});rd.readAsDataURL(b)}catch(e){toast('加载失败')}
}
function compressFromDataURL(d,cb){const img=new Image();img.onload=()=>{
  const mx=800,s=Math.min(1,mx/Math.max(img.width,img.height));
  const cv=document.createElement('canvas');cv.width=img.width*s;cv.height=img.height*s;
  cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);cb(cv.toDataURL('image/jpeg',.85))};img.src=d}

async function doIt(){
  if(!person||!cloth)return toast('请先上传照片和衣服');
  if(!ak)return toast('请先设置 API Key（dashscope.aliyun.com 免费获取）');
  document.getElementById('loading').classList.add('show');

  try{
    // 先上传图片到国内图床获取URL
    document.getElementById('loadingText').textContent='正在上传图片...';
    let clothURL=await uploadToCN(cloth);
    if(!clothURL){
      // 图床失败则尝试base64直传
      document.getElementById('loadingText').textContent='直传模式...';
      clothURL=cloth;
    }

    document.getElementById('loadingText').textContent='AI 正在生成试穿效果...';
    const resultURL=await callVTON(clothURL);
    if(!resultURL)throw new Error('生成失败');

    document.getElementById('ri').src=resultURL;
    document.getElementById('result').classList.add('show');
    toast('试穿完成 ✨');
  }catch(e){toast('❌ '+e.message)}
  document.getElementById('loading').classList.remove('show');
}

async function uploadToCN(dataURL){
  const blob=dataURLtoBlob(dataURL);

  // 路过图床 imgse.com
  try{
    const f=new FormData();
    f.append('file',blob,'cloth.jpg');
    const r=await fetch('https://imgse.com/api/upload',{method:'POST',body:f});
    const d=await r.json();
    if(d.url)return d.url;
  }catch(e){}

  // 聚合图床 api.aa1.cn
  try{
    const f=new FormData();
    f.append('file',blob,'cloth.jpg');
    const r=await fetch('https://api.aa1.cn/api/tcapi/upload',{method:'POST',body:f});
    const d=await r.json();
    if(d.url)return d.url;
  }catch(e){}

  // 备用: SM.MS
  try{
    const f=new FormData();
    f.append('smfile',blob,'cloth.jpg');
    const r=await fetch('https://sm.ms/api/v2/upload',{method:'POST',body:f});
    const d=await r.json();
    if(d.success&&d.data&&d.data.url)return d.data.url;
  }catch(e){}

  return null;
}

async function callVTON(clothURL){
  const r=await fetch('https://dashscope.aliyuncs.com/api/v1/services/aigc/virtualmodel/generation/',{
    method:'POST',
    headers:{'Authorization':'Bearer '+ak,'Content-Type':'application/json','X-DashScope-Async':'enable'},
    body:JSON.stringify({model:'wanx-virtualmodel',input:{base_image_url:base64URL,face_image_url:base64URL,prompt:'真实风格，高质量服装展示',face_prompt:'真实人脸，自然光线'},parameters:{short_side_size:'1024',n:1}})
  });
  if(!r.ok){const e=await r.json();throw new Error(e.message||'API 调用失败，请检查 Key')}
  const t=await r.json();const tid=t.output.task_id;

  for(let i=0;i<30;i++){
    await new Promise(r=>setTimeout(r,2000));
    const cr=await fetch('https://dashscope.aliyuncs.com/api/v1/tasks/'+tid,{headers:{'Authorization':'Bearer '+ak}});
    const cd=await cr.json();
    if(cd.output.task_status==='SUCCEEDED')return cd.output.results[0].url;
    if(cd.output.task_status==='FAILED')throw new Error(cd.output.message||'生成失败');
    document.getElementById('loadingText').textContent='生成中...('+Math.round((i+1)*2)+'s)';
  }
  throw new Error('生成超时，请重试');
}

function dataURLtoBlob(d){const p=d.split(','),m=p[0].match(/:(.*?);/)[1],b=atob(p[1]),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new Blob([a],{type:m})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}
function dl(){const a=document.createElement('a');a.href=document.getElementById('ri').src;a.download='试衣秀_'+new Date().toISOString().slice(0,10)+'.jpg';a.click();toast('已保存到相册')}

setTimeout(()=>search(),600);
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
