<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>试衣秀 · AI引擎</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a2e;color:#fff;min-height:100dvh}
header{text-align:center;padding:20px;background:linear-gradient(135deg,#ec4899,#8b5cf6)}
header h1{font-size:20px}header p{font-size:12px;opacity:.8;margin-top:4px}
.container{max-width:500px;margin:0 auto;padding:16px}
.card{background:#16213e;border-radius:16px;padding:16px;margin-bottom:14px}
.card h3{font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.upload-area{border:2px dashed #2a2a4a;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.2s;background:#0f0f23}
.upload-area:active{transform:scale(.98)}
.upload-area img{max-width:100%;max-height:180px;border-radius:8px;margin-top:8px;display:none}
.upload-area.has img{display:inline}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin:8px 0;transition:.2s}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff}
.btn-primary:disabled{opacity:.4;pointer-events:none}
.result-box{text-align:center}
.result-box img{max-width:100%;max-height:50vh;border-radius:12px;margin-top:12px}
.status{font-size:13px;color:#a0a0c0;text-align:center;margin:8px 0}
.loader{display:none;text-align:center;padding:20px}
.loader.show{display:block}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#ec4899;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
canvas#debug{display:none}
</style>
</head>
<body>
<header>
  <h1>👗 试衣秀引擎</h1>
  <p>MoveNet姿态检测 · CPU模式 · 全手机通用</p>
</header>

<div class="container">
  <div class="card">
    <h3>📷 人物照片</h3>
    <div class="upload-area" id="personArea" onclick="document.getElementById('personFile').click()">
      <div class="placeholder">🧍<br><small>点击上传全身照（正面站立最佳）</small></div>
      <img id="personImg">
    </div>
    <input type="file" id="personFile" accept="image/*" style="display:none" onchange="loadImage(this,'person')">
  </div>

  <div class="card">
    <h3>👔 衣服图片</h3>
    <div class="upload-area" id="clothArea" onclick="document.getElementById('clothFile').click()">
      <div class="placeholder">👕<br><small>点击上传衣服（平铺或模特图）</small></div>
      <img id="clothImg">
    </div>
    <input type="file" id="clothFile" accept="image/*" style="display:none" onchange="loadImage(this,'cloth')">
  </div>

  <button class="btn btn-primary" id="tryonBtn" disabled onclick="doTryOn()">
    ✨ 开始试穿
  </button>

  <div class="status" id="status"></div>
  <div class="loader" id="loader"><div class="spinner"></div>AI 正在分析姿态并合成...</div>

  <div class="card result-box" id="resultCard" style="display:none">
    <h3>✨ 试穿结果</h3>
    <img id="resultImg">
    <button class="btn btn-primary" onclick="downloadResult()">💾 保存图片</button>
  </div>
</div>

<canvas id="debug"></canvas>

<!-- 只加载CPU版TF.js，WebGL根本不引入 -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.17.0/dist/tf-converter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-cpu@4.17.0/dist/tf-backend-cpu.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
// ============ 全局变量 ============
let personImg = null, clothImg = null, detector = null;
const statusEl = document.getElementById('status');

// ============ 图片加载（强制压缩）============
function loadImage(input, type) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      // 强制压到600以内
      const max = 600, s = Math.min(1, max / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * s);
      c.height = Math.round(img.height * s);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      const final = new Image();
      final.onload = () => {
        if (type === 'person') {
          personImg = final;
          document.getElementById('personImg').src = final.src;
          document.getElementById('personArea').classList.add('has');
        } else {
          clothImg = final;
          document.getElementById('clothImg').src = final.src;
          document.getElementById('clothArea').classList.add('has');
        }
        updateBtn();
        statusEl.textContent = '图片就绪: ' + final.width + '×' + final.height;
      };
      final.src = c.toDataURL('image/jpeg', 0.8);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function updateBtn() {
  const btn = document.getElementById('tryonBtn');
  btn.disabled = !(personImg && clothImg);
  btn.textContent = (personImg && clothImg) ? '✨ 开始试穿' : '⚠️ 请先上传两张图片';
}

// ============ MoveNet初始化（CPU）============
async function initDetector() {
  if (detector) return detector;
  statusEl.textContent = '正在加载MoveNet模型（首次约5秒）...';

  // 注册CPU后端（只有CPU，没有WebGL可选）
  await tf.setBackend('cpu');
  await tf.ready();

  const model = poseDetection.SupportedModels.MoveNet;
  detector = await poseDetection.createDetector(model, {
    runtime: 'tfjs',
    modelType: 'SinglePose.Lightning'
  });
  statusEl.textContent = '✅ MoveNet已就绪';
  return detector;
}

// ============ 核心：试穿 ============
async function doTryOn() {
  if (!personImg || !clothImg) return;

  document.getElementById('loader').classList.add('show');
  document.getElementById('resultCard').style.display = 'none';
  statusEl.textContent = '';

  try {
    const det = await initDetector();

    // 检测姿态
    statusEl.textContent = '正在分析人体姿态...';
    const poses = await det.estimatePoses(personImg);

    if (!poses || !poses.length || !poses[0].keypoints) {
      throw new Error('未检测到人体，请上传清晰的正面站立全身照');
    }

    const kp = {};
    for (let k of poses[0].keypoints) kp[k.name] = k;

    // MoveNet关键点映射
    const lSh = kp['left_shoulder'];
    const rSh = kp['right_shoulder'];
    const lHip = kp['left_hip'];
    const rHip = kp['right_hip'];
    const lElb = kp['left_elbow'];
    const rElb = kp['right_elbow'];

    if (!lSh || !rSh || !lHip || !rHip) {
      throw new Error('请确保人物全身可见，正面站立');
    }
    if ([lSh,rSh,lHip,rHip].some(k => k.score < 0.3)) {
      throw new Error('姿态置信度不足，请确保光线充足、背景简洁');
    }

    statusEl.textContent = '正在智能贴合衣服...';

    // 渲染
    const canvas = document.getElementById('debug');
    canvas.width = personImg.width;
    canvas.height = personImg.height;
    const ctx = canvas.getContext('2d');

    // 底图
    ctx.drawImage(personImg, 0, 0);

    // 身体测量
    const shoulderW = Math.abs(rSh.x - lSh.x);
    const hipW = Math.abs(rHip.x - lHip.x);
    const torsoTop = Math.min(lSh.y, rSh.y);
    const torsoBot = Math.max(lHip.y, rHip.y);
    const torsoH = torsoBot - torsoTop;
    const centerX = (lSh.x + rSh.x + lHip.x + rHip.x) / 4;

    // 扩展区域
    const pad = shoulderW * 0.3;
    const topY = torsoTop - pad;
    const botY = torsoBot + pad * 0.5;
    const topW = shoulderW + pad * 2;
    const botW = Math.max(shoulderW, hipW) + pad * 2;

    // 分段变形渲染衣服
    const segs = 8;
    for (let i = 0; i < segs; i++) {
      const t0 = i / segs, t1 = (i + 1) / segs;

      const dy0 = topY + (botY - topY) * t0;
      const dy1 = topY + (botY - topY) * t1;
      const sy0 = t0 * clothImg.height;
      const sy1 = t1 * clothImg.height;

      const tw0 = topW + (botW - topW) * t0;
      const tw1 = topW + (botW - topW) * t1;
      const dx0 = centerX - tw0 / 2;
      const dx1 = centerX + tw0 / 2;
      const dx0b = centerX - tw1 / 2;
      const dx1b = centerX + tw1 / 2;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(dx0, dy0); ctx.lineTo(dx1, dy0);
      ctx.lineTo(dx1b, dy1); ctx.lineTo(dx0b, dy1);
      ctx.closePath(); ctx.clip();

      const sx = clothImg.width / 2;
      const sw = clothImg.width;
      const scaleX = ((tw0 + tw1) / 2) / sw;
      const scaleY = (dy1 - dy0) / (sy1 - sy0);

      ctx.translate(centerX, (dy0 + dy1) / 2);
      ctx.scale(Math.max(scaleX, 0.3), Math.max(scaleY, 0.3));
      ctx.drawImage(clothImg, -clothImg.width/2, -(sy0 + sy1)/2, clothImg.width, clothImg.height);
      ctx.restore();
    }

    // 袖子
    if (lElb && lElb.score > 0.3) drawSleeve(ctx, lSh, lElb, clothImg, shoulderW);
    if (rElb && rElb.score > 0.3) drawSleeve(ctx, rSh, rElb, clothImg, shoulderW);

    // 显示
    document.getElementById('resultImg').src = canvas.toDataURL('image/jpeg', 0.9);
    document.getElementById('resultCard').style.display = 'block';
    statusEl.textContent = '✅ 试穿完成！';

  } catch(e) {
    statusEl.textContent = '❌ ' + e.message;
  } finally {
    document.getElementById('loader').classList.remove('show');
  }
}

// ============ 袖子 ============
function drawSleeve(ctx, shoulder, elbow, clothImg, shoulderW) {
  const dx = elbow.x - shoulder.x;
  const dy = elbow.y - shoulder.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ang = Math.atan2(dy, dx);
  const sw = shoulderW * 0.3;

  ctx.save();
  ctx.translate(shoulder.x, shoulder.y);
  ctx.rotate(ang);
  ctx.drawImage(clothImg, 0, 0, clothImg.width * 0.2, clothImg.height * 0.5,
    -sw/2, 0, sw, len);
  ctx.restore();
}

// ============ 下载 ============
function downloadResult() {
  const img = document.getElementById('resultImg');
  if (!img.src) return;
  const a = document.createElement('a');
  a.href = img.src;
  a.download = '试衣秀_' + new Date().toISOString().slice(0,10) + '.jpg';
  a.click();
}

// ============ 预加载 ============
setTimeout(() => initDetector().catch(e => { statusEl.textContent = '模型加载失败: ' + e.message; }), 1000);
</script>
</body>
</html>
